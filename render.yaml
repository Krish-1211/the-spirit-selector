services:
  # ── 1. Backend API (Node.js Web Service) ─────────────────────────────
  - type: web
    name: reserve-spirits-api
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      - key: NODE_VERSION
        value: 20

      - key: PORT
        value: 10000

      - key: DATABASE_URL
        sync: false   # Use Supabase CONNECTION POOLING URL

      - key: JWT_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 7d

      - key: TAX_RATE
        value: "0.10"

      - key: FRONTEND_URLS
        sync: false   # Add your frontend URL after first deploy

  # ── 2. Frontend (React Static Site) ───────────────────────────────────
  - type: web
    name: reserve-spirits
    runtime: static
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        sync: false   # Paste backend URL after backend deploy

    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    routes:
      - type: rewrite
        source: /*
        destination: /index.html