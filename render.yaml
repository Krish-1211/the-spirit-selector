services:
  # ── 1. Backend API (Node.js Web Service) ─────────────────────────────────────
  - type: web
    name: reserve-spirits-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # Paste your Supabase connection string in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TAX_RATE
        value: "0.10"
      - key: FRONTEND_URLS
        sync: false          # Paste your Render frontend URL after first deploy

  # ── 2. Unified Frontend — Storefront + Admin (Static Site) ───────────────────
  - type: web
    name: reserve-spirits
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Paste your API service URL, e.g. https://reserve-spirits-api.onrender.com
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /images/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # All routes (public + /admin/*) handled by the single React app
      - type: rewrite
        source: /*
        destination: /index.html
